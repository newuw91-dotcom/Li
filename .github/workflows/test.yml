name: test - Direct Push Pro

on:
  workflow_dispatch: # تشغيل يدوي بضغطة زر

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install streamlink --quiet

      - name: Start Direct Stream Engine
        env:
          # الرابط الجديد الذي زودتني به
          STREAM_URL: "http://po.vibertv.online:2086/live/11/11/623874.m3u8"
          RTMP_URL: "rtmp://vsu.okcdn.ru/input/14574023089903_15258718964463_f7662l35iu"
        run: |
          RETRY_COUNT=0
          BACKOFF=3

          while true; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 [Attempt #$RETRY_COUNT] Starting Direct Push..."
            echo "⏰ Time: $(date '+%H:%M:%S UTC')"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # استدعاء أداة streamlink لجلب البث بأقصى سرعة
            # --hls-live-edge 2: للبقاء في أقرب نقطة للبث الحي
            # --stream-segment-threads 3: سحب 3 قطع فيديو معاً لضمان عدم توقف المشغل
            
            streamlink \
              --stdout \
              --loglevel warning \
              --hls-live-restart \
              --hls-live-edge 2 \
              --stream-segment-threads 3 \
              --ringbuffer-size 128M \
              --http-no-ssl-verify \
              --http-header "User-Agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "hls://$STREAM_URL" best \
            | \
            ffmpeg \
              -loglevel warning \
              -use_wallclock_as_timestamps 1 \
              -thread_queue_size 65536 \
              -i pipe:0 \
              -fflags +genpts+igndts+nobuffer+flush_packets \
              -c copy \
              -map 0 \
              -f flv \
              -flvflags no_sequence_end \
              "$RTMP_URL"

            EXIT_CODE=$?
            echo "⚠️ Stream interrupted (exit: $EXIT_CODE) — Reconnecting in ${BACKOFF}s..."
            
            # نظام الانتظار الذكي في حال الانقطاع
            [ $EXIT_CODE -ne 0 ] && BACKOFF=$((BACKOFF < 15 ? BACKOFF + 2 : 15)) || BACKOFF=3
            sleep $BACKOFF
          done
