name: 🔴 Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: 📦 تثبيت الأدوات
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip3 install streamlink --quiet

      - name: 🔴 تشغيل البث مع إعادة التشغيل التلقائي
        run: |
          SOURCE="http://po.vibertv.online:2086/live/11/11/623874.m3u8"
          RTMP="rtmp://vsu.okcdn.ru/input/14611275587311_15327401544431_u6cwcdvuta"
          
          FAIL=0
          while true; do
            echo "▶ بدء البث: $(date)"
            
            streamlink \
              --http-header "User-Agent=Mozilla/5.0 (Linux; Android 13; SM-S918B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Mobile Safari/537.36" \
              --stream-timeout 60 \
              --retry-streams 5 \
              --retry-max 0 \
              --stdout \
              "$SOURCE" best | \
            ffmpeg \
              -hide_banner \
              -loglevel warning \
              -re \
              -i pipe:0 \
              -c copy \
              -f flv \
              "$RTMP"
            
            FAIL=$((FAIL + 1))
            echo "⚠️ انقطع (محاولة $FAIL) - إعادة بعد 5 ثوانٍ..."
            sleep 5
          done

      - name: 🔁 إعادة تشغيل تلقائي
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'stream.yml',
              ref: 'main'
            })