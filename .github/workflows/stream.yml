name: APiX TV High-Res Stable Streamer

on:
  workflow_dispatch:

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip jq curl
          pip3 install streamlink

      - name: Broadcast Stream (Ringbuffer & Zero Latency)
        run: |
          while true; do
            echo "Fetching fresh dynamic URL from panel..."
            DATA=$(curl -s "https://foxtv7.com/panel/url-stream/bein1.json")
            STREAM_URL=$(echo $DATA | jq -r '.url')
            USER_AGENT=$(echo $DATA | jq -r '.useragent')
            
            echo "Starting APiX TV stream with 64M Ringbuffer for maximum stability..."
            
            # إضافة خزان 64 ميجا لامتصاص الانقطاعات من السيرفر الأصلي
            streamlink --stdout --ringbuffer-size 64M \
            --http-header "User-Agent=$USER_AGENT" "dash://$STREAM_URL" best | \
            ffmpeg -thread_queue_size 2048 -i pipe:0 \
            -c:v libx264 -preset ultrafast -tune zerolatency -b:v 6400k -maxrate 6400k -bufsize 12800k -c:a aac -b:a 128k -f flv \
            "rtmp://vsu.okcdn.ru/input/14611275587311_15327401544431_u6cwcdvuta"
            
            echo "Stream disconnected! Reconnecting in 3 seconds..."
            sleep 3
          done
