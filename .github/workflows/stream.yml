name: APiX TV Streamlink Broadcaster

on:
  workflow_dispatch:

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          # تثبيت أداة Streamlink لسحب البث الحي بذكاء
          pip3 install streamlink

      - name: Broadcast Stream
        run: |
          echo "Starting robust stream for APiX TV..."
          
          # Streamlink يقرأ البث ويحدث الخريطة، ثم يمرر الفيديو الصافي لـ FFmpeg
          streamlink --stdout "dash://https://test-link.qpis.workers.dev/live.mpd" best | \
          ffmpeg -i pipe:0 \
          -c:v libx264 -preset superfast -c:a aac -f flv \
          "rtmp://vsu.okcdn.ru/input/14611275587311_15327401544431_u6cwcdvuta"
