name: APiX TV - Live Match Stream (1080p)

# 脵聡脴掳脵聡 脴搂脵聞脴楼脴露脴搂脵聛脴漏 脴陋脴卢脴鹿脵聞 脴搂脵聞脴鲁脵聝脴卤脴篓脴陋 脵聤脴赂脵聡脴卤 脵聝脴虏脴卤 脴陋脴麓脴潞脵聤脵聞 脵聤脴炉脵聢脵聤 脵聛脵聤 脵聢脴搂脴卢脵聡脴漏 脴卢脵聤脴陋 脵聡脴篓
on:
  workflow_dispatch: 

jobs:
  stream_match:
    runs-on: ubuntu-latest
    
    # 脴陋脴颅脴炉脵聤脴炉 脴拢脵聜脴碌脵聣 脵聢脵聜脴陋 脵聞脵聞脴陋脴麓脴潞脵聤脵聞 脴搂脵聞脵聟脴鲁脴陋脵聟脴卤 (脵聟脴芦脵聞脴搂脵聥 3 脴鲁脴搂脴鹿脴搂脴陋 脴陋脵聝脵聛脵聤 脵聞脴拢脵聤 脵聟脴篓脴搂脴卤脴搂脴漏 脵聞脴陋脴卢脵聠脴篓 脵聠脴鲁脵聤脴搂脵聠脵聡 脵聤脴鹿脵聟脵聞)
    timeout-minutes: 180 

    steps:
      - name: 芒職聶茂赂聫 Install FFmpeg (Hardware Acceleration)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3

      - name: 冒聼職聙 Start 1080p Engine Pipeline
        env:
          # 脴卤脴篓脴路 脴搂脵聞脴鲁脵聤脵聝脴卤脴陋脴鲁 脴搂脵聞脴庐脴搂脴碌脴漏 脴篓脵聝
          CH2_URL: ${{ secrets.CH2_URL }}
          CH2_RTMP: ${{ secrets.OK_RTMP_URL_CH2 }}
        run: |
          echo "Starting APiX TV High-Performance Engine..."
          
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          REFERER="https://www.maziika.shop/"
          WORKER_BASE_URL="https://ostora-1.qpis.workers.dev"

          if [ -z "$CH2_URL" ] || [ -z "$CH2_RTMP" ]; then
              echo "芒聺聦 Error: Secrets are missing!"
              exit 1
          fi

          # 脴陋脵聠脴赂脵聤脵聛 脴搂脵聞脴卤脵聢脴搂脴篓脴路
          CLEAN_CH2_URL=$(echo "$CH2_URL" | tr -d '\r\n ' | xargs)
          CLEAN_CH2_RTMP=$(echo "$CH2_RTMP" | tr -d '\r\n ' | xargs)

          # 脴搂脵聞脴陋脴麓脵聛脵聤脴卤 脴楼脵聞脵聣 Base64
          B64_URL=$(python3 -c "import urllib.parse, base64, sys; print(urllib.parse.quote(base64.b64encode(sys.argv[1].encode()).decode()))" "$CLEAN_CH2_URL")
          FINAL_URL="${WORKER_BASE_URL}/?b64url=${B64_URL}"

          echo "芒職隆 Encoding 1080p @ 50fps directly to OK.ru..."

          # 脴搂脵聞脴鲁脵聝脴卤脴篓脴陋 脵聟脴卢脵聡脴虏 脴篓脴拢脴鹿脵聞脵聣 脴卢脵聢脴炉脴漏 脵聟脵聟脵聝脵聠脴漏 脵聞脵聞脵聟脴篓脴搂脴卤脵聤脴搂脴陋 (1080p)
          ffmpeg \
            -hide_banner \
            -re \
            -user_agent "$USER_AGENT" \
            -headers "Referer: $REFERER"$'\r\n'"Origin: https://www.maziika.shop"$'\r\n' \
            -rw_timeout 15000000 \
            -live_start_index 0 \
            -fflags +genpts+discardcorrupt \
            -reconnect 1 -reconnect_delay_max 5 \
            -allowed_extensions js,json,ts,m3u8,key,txt,m4s,mp4 \
            -protocol_whitelist file,http,https,tcp,tls,crypto,data \
            -thread_queue_size 512000 \
            -i "$FINAL_URL" \
            -map 0:v:0 \
            -map 0:a:0 \
            -c:v libx264 \
            -preset veryfast \
            -tune zerolatency \
            -b:v 4500k \
            -maxrate 5000k \
            -bufsize 9000k \
            -r 25 \
            -g 100 \
            -c:a aac -b:a 128k \
            -f fifo \
            -fifo_format flv \
            -drop_pkts_on_overflow 1 \
            -attempt_recovery 1 \
            -recovery_wait_time 2 \
            -queue_size 200000 \
            "$CLEAN_CH2_RTMP"
