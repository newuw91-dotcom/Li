name: APiX TV - Live Match Stream (1080p + Logo)

on:
  workflow_dispatch: 

jobs:
  stream_match:
    runs-on: ubuntu-latest
    
    # حماية السيرفر: الإيقاف التلقائي بعد 3 ساعات
    timeout-minutes: 180 

    steps:
      - name: ⚙️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 wget

      - name: 🚀 Start APiX Engine Pipeline
        env:
          CH2_URL: ${{ secrets.CH2_URL }}
          CH2_RTMP: ${{ secrets.OK_RTMP_URL_CH2 }}
        run: |
          echo "Starting APiX TV High-Performance Engine..."
          
          # تحميل الشعار محلياً لضمان عدم اختفائه أثناء البث
          echo "📥 Downloading channel logo..."
          wget -q -O logo.png "https://iili.io/BLkTCFt.png"
          
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          REFERER="https://www.maziika.shop/"
          WORKER_BASE_URL="https://ostora-1.qpis.workers.dev"

          if [ -z "$CH2_URL" ] || [ -z "$CH2_RTMP" ]; then
              echo "❌ Error: Secrets are missing!"
              exit 1
          fi

          CLEAN_CH2_URL=$(echo "$CH2_URL" | tr -d '\r\n ' | xargs)
          CLEAN_CH2_RTMP=$(echo "$CH2_RTMP" | tr -d '\r\n ' | xargs)

          # التشفير إلى Base64
          B64_URL=$(python3 -c "import urllib.parse, base64, sys; print(urllib.parse.quote(base64.b64encode(sys.argv[1].encode()).decode()))" "$CLEAN_CH2_URL")
          FINAL_URL="${WORKER_BASE_URL}/?b64url=${B64_URL}"

          echo "⚡ Applying Logo, Buffering 8s Delay, and Streaming at 1080p..."

          ffmpeg \
            -hide_banner \
            -re \
            -user_agent "$USER_AGENT" \
            -headers "Referer: $REFERER"$'\r\n'"Origin: https://www.maziika.shop"$'\r\n' \
            -rw_timeout 15000000 \
            -live_start_index -2 \
            -fflags +genpts+discardcorrupt \
            -reconnect 1 -reconnect_delay_max 5 \
            -allowed_extensions js,json,ts,m3u8,key,txt,m4s,mp4 \
            -protocol_whitelist file,http,https,tcp,tls,crypto,data \
            -thread_queue_size 10240 \
            -i "$FINAL_URL" \
            -i logo.png \
            -filter_complex "[1:v]format=rgba,colorchannelmixer=aa=0.85,scale=260:85[watermark];[0:v][watermark]overlay=W-w-40:35[outv]" \
            -map "[outv]" \
            -map 0:a:0 \
            -c:v libx264 \
            -preset veryfast \
            -tune zerolatency \
            -b:v 4500k \
            -maxrate 5000k \
            -bufsize 9000k \
            -g 50 \
            -c:a aac -b:a 128k \
            -f fifo \
            -fifo_format flv \
            -drop_pkts_on_overflow 1 \
            -attempt_recovery 1 \
            -recovery_wait_time 2 \
            -queue_size 200000 \
            "$CLEAN_CH2_RTMP"
