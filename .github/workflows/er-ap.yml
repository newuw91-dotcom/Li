name: Live Stream AP2 (High-Quality 1080p)

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install streamlink

      - name: Start Professional HQ Stream
        run: |
          STREAM_URL="https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/ch1_1080.m3u8"
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14574023089903_15258718964463_f7662l35iu"

          while true; do
            echo "🚀 Launching HQ Engine (VeryFast Preset)..."
            
            streamlink --stdout \
              --hls-live-restart \
              --hls-live-edge 3 \
              --http-no-ssl-verify \
              --http-header "User-Agent=Mozilla/5.0" \
              --http-header "Referer=https://supertv.gg/" \
              "hls://$STREAM_URL" best | \
              ffmpeg -use_wallclock_as_timestamps 1 -i pipe:0 \
              -fflags +genpts+igndts+nobuffer \
              -c:v libx264 -preset veryfast \
              -b:v 6000k -maxrate 6000k -bufsize 12000k \
              -s 1920x1080 -r 30 -g 60 \
              -pix_fmt yuv420p -profile:v high -level 4.2 \
              -x264-params "nal-hrd=cbr:force-cfr=1" \
              -c:a aac -b:a 128k -ar 44100 \
              -f flv "$RTMP_URL"

            echo "⚠️ Auto-Syncing in 5 seconds..."
            sleep 5
          done
