name: Live Stream AP2 (Smart-Force 1080p)

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install streamlink

      - name: Start Intelligent 50FPS Stream
        run: |
          STREAM_URL="https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/ch1_1080.m3u8"
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14574023089903_15258718964463_f7662l35iu"

          while true; do
            echo "🚀 Launching Smart-Update Engine..."
            
            # --hls-live-restart: البدء دائماً من أحدث ثانية متوفرة
            # --hls-playlist-reload-attempts 15: المحاولة المستمرة لتحديث القائمة غصب
            
            streamlink --stdout \
              --hls-live-restart \
              --hls-live-edge 2 \
              --hls-playlist-reload-attempts 15 \
              --http-no-ssl-verify \
              --http-header "User-Agent=Mozilla/5.0" \
              --http-header "Referer=https://supertv.gg/" \
              --http-header "Cache-Control=no-cache" \
              "hls://$STREAM_URL" best | \
              ffmpeg -use_wallclock_as_timestamps 1 -i pipe:0 \
              -fflags +genpts+igndts+nobuffer -flags +low_delay \
              -c:v libx264 -preset ultrafast -tune zerolatency \
              -b:v 5000k -minrate 5000k -maxrate 5000k -bufsize 5000k \
              -s 1920x1080 -r 50 -g 100 \
              -pix_fmt yuv420p -x264-params "nal-hrd=cbr:force-cfr=1" \
              -max_muxing_queue_size 9999 \
              -c:a aac -b:a 128k -ar 44100 \
              -f flv "$RTMP_URL"

            echo "⚠️ Re-syncing and Force-Updating in 5 seconds..."
            sleep 5
          done
