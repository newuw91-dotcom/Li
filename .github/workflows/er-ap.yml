name: Live Stream AP2 (Fast Direct Push)

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install streamlink

      - name: Start Direct Push (No Encoding)
        run: |
          STREAM_URL="https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/ch1_1080.m3u8"
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14574023089903_15258718964463_f7662l35iu"

          while true; do
            echo "🚀 Pushing Direct Stream: No modifications, maximum speed..."
            
            # --hls-live-edge 1: البقاء في قلب الحدث (أقل تأخير ممكن)
            # --hls-segment-threads 3: سحب 3 قطع فيديو في نفس اللحظة
            # --stream-timeout 15: إذا توقف إيرثلنك لـ 15 ثانية، اقطع وأعد الاتصال فوراً
            
            streamlink --stdout \
              --hls-live-restart \
              --hls-live-edge 1 \
              --hls-segment-threads 3 \
              --stream-timeout 15 \
              --http-no-ssl-verify \
              --http-header "User-Agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              --http-header "Referer=https://supertv.gg/" \
              "hls://$STREAM_URL" best | \
              ffmpeg -thread_queue_size 16384 -i pipe:0 \
              -fflags +genpts+igndts+nobuffer+flush_packets \
              -flags +low_delay \
              -c copy \
              -copyts \
              -f flv "$RTMP_URL"

            echo "⚠️ Source dropped or Geo-blocked. Retrying in 5 seconds..."
            sleep 5
          done
