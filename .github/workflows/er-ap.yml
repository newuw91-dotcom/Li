name: Live Stream AP2 (Adaptive Stability)

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install streamlink

      - name: Start Adaptive Push Engine
        run: |
          STREAM_URL="https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/ch1_1080.m3u8"
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14574023089903_15258718964463_f7662l35iu"

          while true; do
            echo "🚀 Adaptive Pushing: Priority Best -> 1080p -> 720p..."
            
            # نحدد هنا الجودات المطلوبة بالترتيب: 1080p أولاً ثم 720p ثم أي جودة أخرى
            # هذا يضمن أن المشغل سيصله دائماً "بيانات" حتى لو ضعف المصدر
            
            streamlink --stdout \
              --hls-live-restart \
              --hls-live-edge 2 \
              --stream-sorting-excludes "<720p" \
              --http-no-ssl-verify \
              --http-header "User-Agent=Mozilla/5.0" \
              --http-header "Referer=https://supertv.gg/" \
              "hls://$STREAM_URL" best,1080p,720p | \
              ffmpeg -thread_queue_size 32768 -i pipe:0 \
              -fflags +genpts+igndts+nobuffer+flush_packets \
              -c copy \
              -f flv -flvflags no_sequence_end \
              "$RTMP_URL"

            echo "⚠️ Quality Shift or Interruption. Recovering..."
            sleep 2
          done
