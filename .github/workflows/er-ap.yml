name: Live Stream AP2 (Anti-Loop 1080p)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install streamlink

      - name: Start Fresh Live Stream
        run: |
          STREAM_URL="https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/ch1_1080.m3u8"
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14574023089903_15258718964463_f7662l35iu"

          while true; do
            echo "🚀 Connecting to source with Cache-Busting..."
            
            # التعديلات الجديدة لمنع تكرار اللقطات:
            # --hls-live-restart: البدء من أحدث لقطة متوفرة حالياً
            # --hls-live-edge 2: التقليل من التأخير لضمان ملاحقة البث الحي
            # Cache-Control & Pragma: إجبار السيرفر على إرسال بيانات فريش
            
            streamlink --stdout \
              --hls-live-restart \
              --hls-live-edge 2 \
              --ringbuffer-size 128M \
              --http-no-ssl-verify \
              --http-header "User-Agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --http-header "Referer=https://supertv.gg/" \
              --http-header "Cache-Control=no-cache, no-store, must-revalidate" \
              --http-header "Pragma=no-cache" \
              --http-header "Expires=0" \
              "hls://$STREAM_URL" best | \
              ffmpeg -i pipe:0 \
              -c:v libx264 -preset ultrafast -tune zerolatency \
              -b:v 5000k -minrate 5000k -maxrate 5000k -bufsize 5000k \
              -x264-params "nal-hrd=cbr" -s 1920x1080 -r 30 -g 60 \
              -pix_fmt yuv420p \
              -c:a aac -b:a 128k -ar 44100 \
              -f flv "$RTMP_URL"
            
            echo "⚠️ Loop or Drop detected. Clearing cache and restarting in 10 seconds..."
            # زدنا وقت الانتظار قليلاً لضمان أن السيرفر يمسح الجلسة القديمة
            sleep 10
          done
