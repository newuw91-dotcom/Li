name: Live Stream AP2 (Direct Flash Push)

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install streamlink

      - name: Start Flash Direct Stream
        run: |
          STREAM_URL="https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/ch1_1080.m3u8"
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14574023089903_15258718964463_f7662l35iu"

          while true; do
            echo "🚀 Flash Pushing: Direct link between Source and Destination..."
            
            # --hls-live-edge 1: البقاء في "نقطة الصفر" للبث المباشر (أسرع تحديث)
            # --stream-segment-threads 3: سحب 3 قطع فيديو في وقت واحد لدفعها للمشغل غصب
            
            streamlink --stdout \
              --hls-live-restart \
              --hls-live-edge 1 \
              --stream-segment-threads 3 \
              --http-no-ssl-verify \
              --http-header "User-Agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              --http-header "Referer=https://supertv.gg/" \
              "hls://$STREAM_URL" best | \
              ffmpeg -thread_queue_size 32768 -i pipe:0 \
              -fflags +genpts+igndts+nobuffer+flush_packets \
              -flags +low_delay \
              -c copy \
              -map 0 \
              -f flv -flvflags no_sequence_end \
              "$RTMP_URL"

            echo "⚠️ Gap detected. Re-connecting in 2 seconds..."
            sleep 2
          done
