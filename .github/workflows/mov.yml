name: mov apix 

on:
  workflow_dispatch:

jobs:
  processing:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip3 install streamlink --quiet

      - name: Execute Data Flow
        env:
          # 🔐 استدعاء سيكرت القناة الثالثة بأمان
          OK_RTMP_URL: ${{ secrets.OK_RTMP_URL_CH3 }}
        run: |
          SOURCE="http://po.vibertv.online:2086/live/11/11/623874.m3u8"
          
          FAIL=0
          while true; do
            echo "Processing packet block: $(date)"
            
            streamlink \
              --http-header "User-Agent=Mozilla/5.0 (Linux; Android 13; SM-S918B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Mobile Safari/537.36" \
              --stream-timeout 60 \
              --retry-streams 5 \
              --retry-max 0 \
              --stdout \
              "$SOURCE" best | \
            ffmpeg \
              -hide_banner \
              -loglevel warning \
              -re \
              -i pipe:0 \
              -c copy \
              -f flv \
              "$OK_RTMP_URL"
            
            FAIL=$((FAIL + 1))
            echo "Notice: Sync block dropped (Attempt $FAIL) - Retrying in 5 seconds..."
            sleep 5
          done

      - name: Trigger Loop
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'apix_stream_ch3.yml',
              ref: 'main'
            })
